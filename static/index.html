<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Tool-Use Agent</title>
<style>
  :root {
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #e5e5e7;
    --text: #1d1d1f;
    --muted: #86868b;
    --accent: #10a37f;
    --accent-hover: #0e8e6f;
    --assistant-bg: #f0f0f1;
    --tool-bg: #fff8e6;
    --tool-border: #f0d97a;
    --result-bg: #eef7ff;
    --result-border: #b5d8f7;
    --error-bg: #fdeded;
    --error-border: #f5c2c2;
    --code-bg: #1e1e1e;
    --code-text: #d4d4d4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.55;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .actions { display: flex; gap: 8px; }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); padding: 6px 12px;
    border-radius: 6px;
  }
  button:hover { background: #f0f0f1; }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px; max-width: 820px;
    width: 100%; margin: 0 auto;
  }
  .msg { margin-bottom: 16px; }
  .msg-role { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .bubble {
    padding: 10px 14px; border-radius: 10px; white-space: pre-wrap;
    word-wrap: break-word;
  }
  .user .bubble { background: var(--accent); color: white; margin-left: 80px; }
  .assistant .bubble { background: var(--assistant-bg); margin-right: 80px; }
  .bubble pre {
    background: var(--code-bg); color: var(--code-text); padding: 10px;
    border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 8px 0 0;
  }
  .bubble code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; font-size: 13px; }
  .user .bubble code { background: rgba(255,255,255,0.2); }

  .tool-call {
    margin: 8px 0 8px 80px; padding: 8px 12px; border-radius: 8px;
    background: var(--tool-bg); border: 1px solid var(--tool-border);
    font-size: 13px;
  }
  .tool-result {
    margin: 4px 0 8px 80px; padding: 8px 12px; border-radius: 8px;
    background: var(--result-bg); border: 1px solid var(--result-border);
    font-size: 13px;
  }
  .tool-result pre {
    margin: 6px 0 0; padding: 8px; background: white; border-radius: 4px;
    overflow-x: auto; max-height: 220px; overflow-y: auto; font-size: 12px;
  }
  .tool-call .label, .tool-result .label {
    font-weight: 600; font-size: 12px; color: var(--muted);
  }
  .tool-call .name { color: #b8860b; }

  .error-msg {
    margin: 8px 80px; padding: 10px 14px; border-radius: 8px;
    background: var(--error-bg); border: 1px solid var(--error-border);
    color: #a02020; font-size: 13px;
  }

  #composer {
    max-width: 820px; width: 100%; margin: 0 auto; padding: 0 20px 20px;
  }
  .composer-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 8px;
  }
  #input {
    flex: 1; border: none; outline: none; resize: none; font: inherit;
    padding: 8px; max-height: 200px; min-height: 40px; background: transparent;
  }
  #send { border: none; align-self: stretch; padding: 0 16px; }

  footer { text-align: center; color: var(--muted); font-size: 12px; padding: 6px; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: var(--panel); border-radius: 10px; padding: 20px;
    width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }
  .modal h2 { margin: 0 0 12px; font-size: 16px; }
  .modal input {
    width: 100%; padding: 8px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; margin-bottom: 12px;
  }
  .modal p { color: var(--muted); font-size: 12px; margin: 0 0 10px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }

  .typing { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Claude Tool-Use Agent</h1>
    <div class="actions">
      <button id="settings-btn" title="API Key">⚙ API Key</button>
      <button id="clear-btn">清空</button>
    </div>
  </header>

  <div id="messages"></div>

  <div id="composer">
    <div class="composer-row">
      <textarea id="input" rows="1" placeholder="问点啥…（Enter 发送，Shift+Enter 换行）"></textarea>
      <button id="send" class="primary">发送</button>
    </div>
    <footer>Powered by Anthropic Claude · 工具：联网搜索 + Python 代码</footer>
  </div>
</div>

<div id="settings-modal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <h2>配置 Anthropic API Key</h2>
    <p>留空则使用服务端的 ANTHROPIC_API_KEY 环境变量。Key 仅保存在浏览器 localStorage，不会写入服务器持久存储。</p>
    <input id="api-key-input" type="password" placeholder="sk-ant-..." />
    <div class="actions">
      <button id="settings-cancel">取消</button>
      <button id="settings-save" class="primary">保存</button>
    </div>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const messagesEl = $("#messages");
const inputEl = $("#input");
const sendBtn = $("#send");

let busy = false;
let history = []; // [{role, content}]

// ---------- Settings ----------
$("#settings-btn").addEventListener("click", () => {
  $("#api-key-input").value = localStorage.getItem("anthropic_api_key") || "";
  $("#settings-modal").style.display = "flex";
});
$("#settings-cancel").addEventListener("click", () => {
  $("#settings-modal").style.display = "none";
});
$("#settings-save").addEventListener("click", () => {
  const v = $("#api-key-input").value.trim();
  if (v) localStorage.setItem("anthropic_api_key", v);
  else localStorage.removeItem("anthropic_api_key");
  $("#settings-modal").style.display = "none";
});

// ---------- Clear ----------
$("#clear-btn").addEventListener("click", () => {
  if (!confirm("清空对话历史？")) return;
  history = [];
  messagesEl.innerHTML = "";
});

// ---------- Input ----------
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
});
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener("click", send);

// ---------- Render ----------
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&").replace(/</g, "<").replace(/>/g, ">")
    .replace(/"/g, """).replace(/'/g, "&#39;");
}

function renderMarkdown(text) {
  // very small markdown: code fences and inline code only
  const parts = [];
  const re = /```(\w+)?\n([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ t: "text", v: text.slice(last, m.index) });
    parts.push({ t: "code", lang: m[1] || "", v: m[2] });
    last = re.lastIndex;
  }
  if (last < text.length) parts.push({ t: "text", v: text.slice(last) });
  return parts.map(p => {
    if (p.t === "code") return `<pre><code>${escapeHtml(p.v)}</code></pre>`;
    // inline code
    return escapeHtml(p.v).replace(/`([^`]+)`/g, "<code>$1</code>");
  }).join("");
}

function addMessage(role, contentHtml) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<div class="msg-role">${role === "user" ? "你" : "Claude"}</div>
    <div class="bubble">${contentHtml}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addToolCard(name, input) {
  const div = document.createElement("div");
  div.className = "tool-call";
  const inputStr = typeof input === "string" ? input : JSON.stringify(input, null, 2);
  div.innerHTML = `<div class="label">🔧 工具调用 <span class="name">${escapeHtml(name)}</span></div>
    <pre>${escapeHtml(inputStr)}</pre>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addResultCard(name, output) {
  const div = document.createElement("div");
  div.className = "tool-result";
  div.innerHTML = `<div class="label">📥 <span class="name">${escapeHtml(name)}</span> 返回</div>
    <pre>${escapeHtml(output)}</pre>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addError(message) {
  const div = document.createElement("div");
  div.className = "error-msg";
  div.textContent = message;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ---------- Send + SSE ----------
function setBusy(b) {
  busy = b;
  sendBtn.disabled = b;
  inputEl.disabled = b;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = "";
  inputEl.style.height = "auto";

  addMessage("user", escapeHtml(text));
  history.push({ role: "user", content: text });

  const assistantDiv = addMessage("assistant", '<span class="typing">思考中…</span>');
  const bubble = assistantDiv.querySelector(".bubble");

  let apiKey = localStorage.getItem("anthropic_api_key") || "";

  setBusy(true);

  let fullText = "";
  let firstChunk = true;

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        api_key: apiKey,
        history: history.slice(0, -1), // exclude current (server adds it)
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: "请求失败" }));
      bubble.innerHTML = "";
      addError(err.error || `HTTP ${resp.status}`);
      setBusy(false);
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // SSE events separated by \n\n
      let idx;
      while ((idx = buffer.indexOf("\n\n")) >= 0) {
        const raw = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        const evt = parseSse(raw);
        if (!evt) continue;

        if (firstChunk && (evt.event === "text" || evt.event === "tool_use" || evt.event === "tool_result")) {
          bubble.innerHTML = "";
          firstChunk = false;
        }

        if (evt.event === "text") {
          fullText += evt.data.text;
          bubble.innerHTML = renderMarkdown(fullText);
        } else if (evt.event === "tool_use") {
          if (!firstChunk) bubble.innerHTML = renderMarkdown(fullText);
          addToolCard(evt.data.name, evt.data.input);
        } else if (evt.event === "tool_result") {
          addResultCard(evt.data.name, evt.data.output);
        } else if (evt.event === "error") {
          addError(evt.data.message);
        } else if (evt.event === "done") {
          // finish
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    if (fullText) {
      history.push({ role: "assistant", content: fullText });
    }
  } catch (e) {
    bubble.innerHTML = "";
    addError("网络错误: " + e.message);
  } finally {
    if (firstChunk) bubble.innerHTML = '<span class="typing">(无回复)</span>';
    setBusy(false);
  }
}

function parseSse(raw) {
  const lines = raw.split("\n");
  let event = "message", dataStr = "";
  for (const line of lines) {
    if (line.startsWith("event:")) event = line.slice(6).trim();
    else if (line.startsWith("data:")) dataStr += line.slice(5).trim();
  }
  if (!dataStr) return null;
  try {
    return { event, data: dataStr === "null" ? null : JSON.parse(dataStr) };
  } catch {
    return { event, data: { raw: dataStr } };
  }
}
</script>
</body>
</html>
