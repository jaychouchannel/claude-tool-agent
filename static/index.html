<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 多角色聊天室</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>Claude 多角色聊天室</h1>
            <div class="header-actions">
                <button id="btn-rules" class="btn btn-ghost">⚙ 群公告</button>
                <button id="btn-apikey" class="btn btn-ghost">🔑 API Key</button>
                <button id="btn-clear" class="btn btn-ghost">清空</button>
            </div>
        </header>

        <!-- Main area: roles panel + chat -->
        <main class="app-main">
            <!-- Roles panel -->
            <aside class="roles-panel">
                <h2 class="panel-title">角色</h2>
                <div id="roles-list" class="roles-list"></div>
                <button id="btn-add-role" class="btn btn-add-role">+ 新增角色</button>
                <div class="roles-import-export">
                    <button id="btn-export-roles" class="btn btn-small">导出 JSON</button>
                    <button id="btn-import-roles" class="btn btn-small">导入 JSON</button>
                    <input type="file" id="import-roles-file" accept=".json" style="display:none">
                </div>
            </aside>

            <!-- Chat area -->
            <section class="chat-area">
                <div id="messages" class="messages"></div>
                <div class="composer">
                    <div class="composer-input-wrap">
                        <textarea id="composer-input" class="composer-input"
                            placeholder="发消息……用 @角色名 提及某个角色"
                            rows="1"></textarea>
                        <div id="mention-popup" class="mention-popup" style="display:none"></div>
                    </div>
                    <button id="btn-send" class="btn btn-primary">发送</button>
                    <button id="btn-stop" class="btn btn-danger" style="display:none">停止</button>
                </div>
                <div class="composer-footer">Powered by Anthropic · 多角色聊天室</div>
            </section>
        </main>
    </div>

    <!-- Role editor modal -->
    <div id="role-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3 id="role-modal-title">角色设定</h3>
            <label>名字
                <input id="role-name" type="text" placeholder="如：研究员">
            </label>
            <label>系统 prompt
                <textarea id="role-prompt" rows="6" placeholder="你是一位严谨的研究员，回答喜欢引用数据⋯"></textarea>
            </label>
            <label>模型
                <select id="role-model">
                    <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 (Haiku)</option>
                    <option value="claude-sonnet-5">claude-sonnet-5 (Sonnet)</option>
                    <option value="claude-opus-4-7">claude-opus-4-7 (Opus)</option>
                    <option value="claude-opus-4-8">claude-opus-4-8 (Opus)</option>
                    <option value="claude-fable-5">claude-fable-5 (Fable)</option>
                </select>
            </label>
            <div class="modal-actions">
                <button id="role-cancel" class="btn btn-ghost">取消</button>
                <button id="role-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- Group rules modal -->
    <div id="rules-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>群公告（所有角色共同遵循）</h3>
            <textarea id="rules-input" rows="10"
                placeholder="当提到代码问题时，@代码手 应先确认再让别人发言；每轮最多 3 次模型间对话；不要重复别人已经说过的话。"></textarea>
            <div class="modal-actions">
                <button id="rules-cancel" class="btn btn-ghost">取消</button>
                <button id="rules-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- API key modal -->
    <div id="apikey-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h3>Anthropic API Key</h3>
            <input id="apikey-input" type="password" placeholder="sk-ant-...">
            <p class="modal-hint">Key 仅保存在浏览器 localStorage，不会上传到任何第三方。</p>
            <div class="modal-actions">
                <button id="apikey-cancel" class="btn btn-ghost">取消</button>
                <button id="apikey-save" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- Empty state for no roles -->
    <div id="empty-roles-toast" class="toast" style="display:none">请先添加至少一个角色。</div>

    <script src="/static/app.js"></script>
</body>
</html>
